<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roblox Badge Date Finder</title>
</head>
<body>
  <h2>Roblox Game Join Badge Date Finder</h2>

  <input type="text" id="username" placeholder="Enter Roblox username" onkeypress="if(event.key==='Enter'){checkBadge();}" />
  <button onclick="checkBadge()">Check Badge Date</button>

  <p id="result">Enter a username above and click the button.</p>

  <script>
    async function checkBadge() {
      const username = document.getElementById("username").value.trim();
      const resultEl = document.getElementById("result");

      if (!username) {
        resultEl.innerText = "Please enter a username.";
        return;
      }

      resultEl.innerText = "Fetching badge data...";

      try {
        const proxy = "https://cors-anywhere.herokuapp.com/";

        // Step 1: Get User ID
        const userRes = await fetch(proxy + `https://users.roblox.com/v1/users/by-username/${username}`);
        const userData = await userRes.json();

        if (!userData.id) {
          resultEl.innerText = "User not found.";
          return;
        }

        const userId = userData.id;

        // Step 2: Get badges
        const badgesRes = await fetch(proxy + `https://badges.roblox.com/v1/users/${userId}/badges?limit=100&sortOrder=Asc`);
        const badgesData = await badgesRes.json();

        // Step 3: Find specific badge
        const badgeId = 3221720669161306;
        const badge = badgesData.data.find(b => b.awardId === badgeId);

        if (badge) {
          const date = new Date(badge.awardedDate);
          resultEl.innerText = `${username} earned the badge on: ${date.toUTCString()}`;
        } else {
          resultEl.innerText = `${username} has not earned this badge.`;
        }

      } catch (err) {
        console.error(err);
        resultEl.innerText = "Error fetching badge data.";
      }
    }
  </script>
</body>
</html>
